<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image-to-3D Viewer</title>
    <!-- Import Google's model-viewer component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #1e1e1e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0;
            font-size: 24px;
            color: #4CAF50;
        }
        .viewer-container {
            flex-grow: 1;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #2a2a2a;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .controls {
            padding: 15px;
            display: flex;
            gap: 15px;
            background-color: #1e1e1e;
            width: 100%;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        input[type="file"] {
            color: white;
            background-color: #2a2a2a;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        #loadingOverlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            border: 5px solid #333;
            border-top: 5px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #errorMsg {
            color: #ff5252;
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Image-to-3D Mesh Viewer</h1>
    </header>
    
    <div class="controls">
        <input type="file" id="imageInput" accept="image/png, image/jpeg">
        <button id="generateBtn" onclick="uploadAndGenerate()">Generate 3D</button>
    </div>

    <div class="viewer-container">
        <!-- Loading Overlay -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div id="loadingText">AI is processing your image...</div>
            <div id="errorMsg"></div>
        </div>

        <model-viewer 
            id="viewer"
            src="" 
            alt="A 3D model generated by AI" 
            auto-rotate 
            camera-controls 
            ar
            shadow-intensity="1">
        </model-viewer>
    </div>

    <script>
        async function uploadAndGenerate() {
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select an image file first.");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const overlay = document.getElementById('loadingOverlay');
            const errorMsg = document.getElementById('errorMsg');
            const viewer = document.getElementById('viewer');
            const spinner = document.querySelector('.spinner');
            const loadingText = document.getElementById('loadingText');

            // Reset UI
            btn.disabled = true;
            errorMsg.innerText = "";
            spinner.style.display = 'block';
            loadingText.style.display = 'block';
            overlay.style.display = 'flex';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "An unknown error occurred.");
                }

                // Success! Update the viewer
                viewer.src = data.glb_url;
                overlay.style.display = 'none';

            } catch (err) {
                console.error(err);
                spinner.style.display = 'none';
                loadingText.style.display = 'none';
                errorMsg.innerText = err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
